<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>كودنيمز</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body class="lobby-body">

  <div class="briefing-bg" aria-hidden="true"></div>

  <main class="lobby-card">
    <div class="lobby-stamp">TOP SECRET</div>
    <h1 class="lobby-title" data-i18n="title">كودنيمز</h1>
    <p class="lobby-sub" data-i18n="subtitle">غرفة عمليات سرية للعب مع فريقك</p>

    <div class="lang-toggle" role="group" aria-label="Language">
      <button class="lang-btn active" data-lang="ar" type="button">عربي</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>

    <label class="field-label" for="nameInput" data-i18n="yourName">اسمك</label>
    <input id="nameInput" class="field-input" type="text" maxlength="20" autocomplete="off" placeholder="..." data-i18n-ph="namePh" />

    <div class="lobby-actions">
      <button id="createBtn" class="btn btn-primary" type="button" data-i18n="createRoom">إنشاء غرفة جديدة</button>

      <div class="divider"><span data-i18n="or">أو</span></div>

      <label class="field-label" for="codeInput" data-i18n="roomCode">كود الغرفة</label>
      <input id="codeInput" class="field-input code-input" type="text" maxlength="4" autocomplete="off" placeholder="XXXX" />
      <button id="joinBtn" class="btn btn-secondary" type="button" data-i18n="joinRoom">دخول الغرفة</button>
    </div>

    <p id="errorMsg" class="error-msg" role="alert"></p>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="i18n.js"></script>
  <script src="lobby.js"></script>
</body>
</html>
