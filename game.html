<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>كودنيمز</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body class="game-body">
  <div class="briefing-bg" aria-hidden="true"></div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="room-chip">
      <span data-i18n="roomLabel">الغرفة</span>
      <b id="roomCodeLabel">----</b>
      <button class="copy-btn" id="copyBtn" type="button" data-i18n="copyCode">نسخ الكود</button>
    </div>
    <div class="score-pill" id="scorePill">
      <span class="score-red">🔴 9</span>
      <span class="score-blue">🔵 8</span>
    </div>
    <div class="lang-toggle" role="group" aria-label="Language">
      <button class="lang-btn" data-lang="ar" type="button">عربي</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>
  </div>

  <!-- Team picker (lobby phase) -->
  <section id="teamPicker" class="team-picker hidden">
    <h2 data-i18n="pickTeam">اختر فريقك ودورك</h2>
    <div class="team-grid">
      <div class="team-col red">
        <h3 data-i18n="teamRed">الفريق الأحمر</h3>
        <button class="role-btn" data-team="red" data-role="spymaster" type="button" data-i18n="roleSpymaster">مرشد سري</button>
        <button class="role-btn" data-team="red" data-role="operative" type="button" data-i18n="roleOperative">عميل</button>
      </div>
      <div class="team-col blue">
        <h3 data-i18n="teamBlue">الفريق الأزرق</h3>
        <button class="role-btn" data-team="blue" data-role="spymaster" type="button" data-i18n="roleSpymaster">مرشد سري</button>
        <button class="role-btn" data-team="blue" data-role="operative" type="button" data-i18n="roleOperative">عميل</button>
      </div>
    </div>
    <button id="startBtn" class="start-btn" data-i18n="startGame">ابدأ اللعبة</button>
    <div class="player-list" id="playerList"></div>
  </section>

  <!-- Game phase -->
  <section id="gameArea" class="hidden">
    <div id="turnBanner" class="turn-banner red" data-i18n="turnRed">دور الفريق الأحمر</div>
    <div id="clueBar" class="clue-bar">
      <span data-i18n="noClueYet">بانتظار التلميح من المرشد السري...</span>
    </div>
    <div id="board" class="board"></div>
  </section>

  <!-- Bottom controls -->
  <div id="controlsDock" class="controls-dock hidden">
    <form id="clueForm" class="clue-form hidden">
      <input type="text" id="clueWordInput" data-i18n-ph="clueWordPh" maxlength="24" autocomplete="off" />
      <input type="number" id="clueNumberInput" class="num" min="0" max="9" data-i18n-ph="clueNumberPh" />
      <button type="submit" data-i18n="sendClue">إرسال التلميح</button>
    </form>
    <button id="endTurnBtn" class="end-turn-btn hidden" type="button" data-i18n="endTurn">إنهاء الدور</button>
    <div id="statusLine" class="status-line"></div>
  </div>

  <!-- End of game overlay -->
  <div id="endOverlay" class="end-overlay hidden">
    <div class="end-card">
      <h2 id="winnerText"></h2>
      <button id="playAgainBtn" class="start-btn" data-i18n="playAgain">لعبة جديدة</button>
      <p style="margin-top:14px;">
        <button id="leaveBtn" class="icon-btn" data-i18n="leaveRoom">مغادرة الغرفة</button>
      </p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="i18n.js"></script>
  <script src="game.js"></script>
</body>
</html>
